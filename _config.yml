theme: jekyll-theme-minimal

title: 기술 블로그
description: 개발 경험과 지식을 공유하는 기술 블로그

# GitHub 저장소 (로컬 빌드 시 관리자 링크용). GitHub Pages 빌드에서는 site.github.repository_nwo가 우선됩니다.
blog_repository: beoming/beoming.github.io
blog_branch: main

# 관리자 페이지: 공개 네비에는 링크 없음. 아래 permalink만 북마크하세요.
# 선택 보호: 비밀번호 SHA-256(hex, 소문자). 생성 예: printf '내암호' | shasum -a 256
# 비워 두면 암호 없이 URL만으로 접속 가능(난수 URL은 여전히 저장소에 노출됨).
admin_unlock_sha256: ""

defaults:
  - scope:
      path: admin.md
    values:
      permalink: /beom-a7k9-m3px-manage/
      robots: noindex, nofollow

# 빌드 설정
markdown: kramdown
highlighter: rouge

# 퍼머링크 설정
permalink: /:year/:month/:day/:title/

# 포스트 페이지네이션 (jekyll-paginate)
paginate: 8
paginate_path: "/page:num/"

plugins:
  - jekyll-seo-tag
  - jekyll-paginate

# 제외 파일
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .git
