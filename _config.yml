# The Site Configuration

theme: jekyll-theme-chirpy

lang: ko-KR
timezone: Asia/Seoul

title: 기술 블로그
tagline: 개발 경험과 지식을 공유합니다
description: >-
  개발 경험과 지식을 공유하는 기술 블로그입니다.

url: "https://beoming.github.io"
baseurl: ""

github:
  username: beoming

twitter:
  username:

social:
  name: Beoming
  email:
  links:
    - https://github.com/beoming

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

theme_mode:

cdn:

avatar: /assets/img/avatar.png

social_preview_image:

toc: true

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 8
paginate_path: "/page:num/"

# GitHub 저장소 (로컬 빌드 시 관리자 링크용). GitHub Pages에서는 site.github.repository_nwo가 우선합니다.
blog_repository: beoming/beoming.github.io
blog_branch: main

# 관리자 페이지: 공개 네비에는 링크 없음. permalink만 북마크하세요.
# 선택 보호: 비밀번호 SHA-256(hex, 소문자).
admin_unlock_sha256: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: admin.md
    values:
      permalink: /beom-a7k9-m3px-manage/
      robots: noindex, nofollow
      layout: page
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /:year/:month/:day/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - Gemfile
  - Gemfile.lock

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

plugins:
  - jekyll-archives
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
