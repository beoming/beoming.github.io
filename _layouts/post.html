---
layout: default
---

<p class="post-meta"><time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%Y년 %m월 %d일" }}</time></p>
<h1>{{ page.title }}</h1>

{% if page.author or site.author %}
<p class="view">작성 {{ page.author | default: site.author }}</p>
{% endif %}

{{content}}

{% if page.tags %}
  <small>tags: <em>{{ page.tags | join: "</em> - <em>" }}</em></small>
{% endif %}
